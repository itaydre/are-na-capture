<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>div to are.na</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>div to are.na</h1>
      <div class="header-actions">
        <span class="shortcut-hint">⌘⇧S</span>
        <button id="start-capture-btn" class="btn-icon" aria-label="Start capture">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>
      </div>
    </header>

    <!-- Authentication Section -->
    <div id="auth-section" class="section hidden">
      <p class="auth-message">Please authenticate with Are.na to continue.</p>
      <button id="login-btn" class="btn btn-primary">Login to Are.na</button>
      <div id="auth-error" class="error-message hidden"></div>
    </div>

    <!-- Main Content Section -->
    <div id="main-section" class="section hidden">
      <!-- Capture Status -->
      <div id="capture-status" class="status-message">
        <p>Click the camera icon to capture elements from the current page.</p>
      </div>

      <!-- Captured Image Preview -->
      <div id="preview-section" class="preview-section hidden">
        <h3>Captured Element</h3>
        <div class="image-preview">
          <img id="preview-image" src="" alt="Captured element">
          <button id="reset-capture-btn" class="btn-reset" aria-label="Reset capture">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Channel Selection -->
      <div id="channel-section" class="channel-section hidden">
        <div class="search-container">
          <input
            type="text"
            id="channel-search"
            class="search-input"
            placeholder="Type to search..."
            autocomplete="off"
            aria-label="Search channels"
          />
        </div>
        <!-- Create Channel Form (hidden by default) -->
        <div id="create-channel-form" class="create-channel-form hidden">
          <input
            type="text"
            id="new-channel-title"
            class="search-input"
            placeholder="Channel name"
            autocomplete="off"
            aria-label="New channel name"
          />
          <div class="create-channel-options">
            <div class="status-select">
              <button type="button" class="status-option selected" data-status="closed" aria-pressed="true">
                <span class="channel-status channel-status-closed" aria-hidden="true"></span> Closed
              </button>
              <button type="button" class="status-option" data-status="public" aria-pressed="false">
                <span class="channel-status channel-status-public" aria-hidden="true"></span> Open
              </button>
              <button type="button" class="status-option" data-status="private" aria-pressed="false">
                <span class="channel-status channel-status-private" aria-hidden="true"></span> Private
              </button>
            </div>
            <div class="create-channel-actions">
              <button id="cancel-create-channel" class="btn btn-cancel" aria-label="Cancel"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg></button>
              <button id="confirm-create-channel" class="btn btn-primary" aria-label="Create"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,7.5 5.5,10.5 11.5,3.5"/></svg></button>
            </div>
          </div>
        </div>

        <div class="channels-container">
          <div class="channels-header-row">
            <h2 id="channels-header" class="channels-header">Recent channels</h2>
            <button id="new-channel-btn" class="btn-new-channel" aria-label="Create new channel">+ New</button>
          </div>
          <ul id="channel-list" class="channel-list">
            <li class="channel-item loading-item">
              <span>Loading channels...</span>
            </li>
          </ul>
        </div>
        <div id="channel-loading" class="loading hidden">Loading channels...</div>
        <div id="channel-error" class="error-message hidden"></div>
      </div>

      <!-- Upload Button -->
      <button id="upload-btn" class="btn btn-success btn-block hidden" disabled>Upload to Are.na</button>

      <!-- Loading Indicator -->
      <div id="upload-loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Uploading...</span>
      </div>

      <!-- Success/Error Messages -->
      <div id="message" class="message hidden"></div>
    </div>

    <!-- Loading State -->
    <div id="loading-section" class="section">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
